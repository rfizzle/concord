# Concord default code-review criteria for member mods.
#
# Resolution order in CI: explicit `criteria-file` workflow input → the
# repo's own .ai/review-criteria.yml → this file. Copy this file into a mod
# repo's .ai/ (whole-file override) to add domain-specific criteria — e.g.
# a hot-path performance note for the mod's busiest handler.
#
# Categories are scored on a 3-level scale (pass / warn / fail → rendered as
# ✓ / ⚠ / ✗) for the scorecard. Each finding also carries a severity, which is
# the action signal:
#
#   must_fix — a verified bug, regression, spec violation, or safety break
#              (correctness, thread/mixin/compat breakage, data loss). One or
#              more sets the verdict to CHANGES_REQUESTED; these are the items
#              the fix step addresses.
#   optional — polish that does not affect correctness: convention nits,
#              cleanup (unused import, copy-paste), naming, or missing coverage
#              on trivial / dead code. Never sets CHANGES_REQUESTED; never
#              drives the fix loop.
#
# Verdict = CHANGES_REQUESTED if any must_fix finding exists, else APPROVE.
# Each category carries a `severity:` that is the *ceiling* for real findings
# in it: a ✗ is always must_fix; a ⚠ takes the category severity only when it
# is a genuine latent problem, otherwise it drops to optional. Nothing here
# gates the GitHub merge button — the verdict guides the author and the fix step.
#
# Each category may declare `applies_when` to scope it to specific diffs;
# omitting it means the category always applies.

scoring: pass_warn_fail

categories:
  - id: spec_alignment
    name: Spec alignment
    severity: must_fix
    description: |
      Does the PR implement what the linked issue spec describes?
      Acceptance criteria covered? Anything out-of-scope sneaking in?
    look_at:
      - linked issue body (the spec posted by the claude-spec workflow)

  - id: conventions
    name: Project conventions
    severity: optional
    description: |
      Mojang mappings (not Yarn). ResourceLocations via the mod's id()
      helper, never hand-built with an inlined mod id. Correct source set
      (main / client / gametest). Commit messages follow Conventional
      Commits with a topical scope naming the feature area (per AGENTS.md).
    look_at:
      - AGENTS.md

  - id: correctness
    name: Correctness
    severity: must_fix
    description: |
      Logic bugs, off-by-ones, null/Optional handling, edge cases, error
      paths. Are loops bounded? Are early returns correct? Persisted-state
      changes that risk data loss or break save/config migration.
    look_at:
      - .ai/skills/mc-persistence/SKILL.md (if present)
      - .ai/skills/mc-config/SKILL.md (if present)

  - id: thread_safety
    name: Thread safety
    severity: must_fix
    description: |
      Client/server boundary crossings. Shared mutable state guarded
      (ConcurrentMap, volatile, Atomic, synchronized where appropriate).
      No client-only types referenced from main source set.
    look_at:
      - .ai/skills/mc-shared-state/SKILL.md (if present)

  - id: mixin_safety
    name: Mixin safety
    severity: must_fix
    description: |
      Injection point correctness. @Inject vs @Redirect vs @ModifyVariable
      choice. CallbackInfo / CallbackInfoReturnable return handling.
      Access widener scope minimized.
    look_at:
      - .ai/skills/mc-mixin-craft/SKILL.md (if present)
    applies_when: |
      PR touches *Mixin.java, a *.mixins.json file, or a *.accesswidener
      file.

  - id: test_coverage
    name: Test coverage
    severity: optional
    description: |
      Non-trivial logic has tests. Correct tier chosen: pure JUnit for plain
      logic, fabric-loader-junit for things needing the loader, Fabric
      gametests for anything needing a live world. No mocking of Fabric APIs
      that should be exercised in a gametest.
    look_at:
      - .ai/skills/mc-mod-testing/SKILL.md (if present)
      - .ai/skills/mc-testing-mock/SKILL.md (if present)

  - id: site_docs
    name: Site docs
    severity: optional
    description: |
      Player-facing changes should reach the mod's published site. A new
      feature, a new or changed config option or command, or altered gameplay
      needs the matching `site/pages/<slug>.json` page updated (a features
      card, a config row, a commands/faq entry). Score ⚠ when such a change
      ships with no `site/` update — especially when the linked issue spec's
      Docs impact section called for one. Do not flag internal-only changes
      (fixes, refactors, chores, perf) that players never observe.
    look_at:
      - site/pages/*.json (block schema in concord's template/README.md)
      - linked issue spec's "Docs impact" section
    applies_when: |
      PR introduces or changes player-facing behavior — a feat-typed change, a
      new/changed config option or command, or altered gameplay. Omit for
      fix / chore / refactor / perf / internal diffs players never see.

  - id: changelog
    name: Changelog
    severity: optional
    description: |
      A hand-authored `changelogs/<version>.md` ships VERBATIM to GitHub,
      Modrinth, and CurseForge in place of the AI-generated notes, so grade it
      as the finished public release notes, not as source. Score ⚠ when the
      file:
        - leaks developer/CI jargon — commit hashes, PR numbers, author handles,
          branch names, build-tooling bumps, "green CI" — which renders as-is on
          the store page;
        - lists internal-only work (tests, refactors, chores, doc edits) with no
          player-visible effect;
        - invents, inflates, or pre-announces changes not shipped in this
          version;
        - omits the one-to-two-sentence lead, or buries an action players must
          take (config reset, world backup, now-incompatible dependency);
        - uses headings other than `## Added`, `## Changed`, `## Fixed` (that
          order, empty sections omitted), or carries a preamble / sign-off /
          "generated by" banner.
      Grade content and shape only — the file is committed ahead of the release
      tag, so do not check the filename against a tag that does not exist yet.
      Judge it as a player reading a store page: does it say what changed and
      whether to update, in their words, and nothing else.
    look_at:
      - .ai/skills/mc-changelog/SKILL.md (if present)
    applies_when: |
      PR adds or edits a file under `changelogs/`. Omit entirely for the common
      case where the diff touches no changelog file.

  - id: feature_completeness
    name: Feature completeness
    severity: optional
    description: |
      A new player-facing surface owes every paired surface, not just the ones
      the diff happened to touch. This is an absence check keyed on the *kind*
      of change: when a PR adds a new config option (a new public field on the
      config class), a new command, or a new player-facing feature, verify ALL
      of these surfaces and score ⚠ for each one skipped:
        - Config GUI: the option appears in the mod's config-screen integration
          (Mod Menu / Cloth Config builder), with default and min/max matching
          the config class field's default and validation.
        - Lang strings: every new Component.translatable(...) key — config
          labels, tooltips, command feedback — has an
          assets/<modid>/lang/en_us.json entry (a missing key renders the raw
          translation id in-game).
        - Site docs: delegated to the `site_docs` category; do not re-score it
          here.
        - README config-section list, if the mod maintains one.
        - HUD surface: a new on-screen HUD element conforms to the Concord HUD
          Standard — the slot-badge rules for a persistent element, or the
          hold-to-peek detail-panel pattern (unbound keybind, non-capturing, the
          badge's four visibility rules, no slot/accessors, paged overflow, and no
          duplication of recipe-viewer/tooltip catalogs) for an on-demand one.
    look_at:
      - the mod's compat Mod Menu / Cloth Config integration class
      - assets/<modid>/lang/en_us.json
      - the mod's config class (for new public fields)
      - .ai/skills/mc-config/SKILL.md (if present)
      - .ai/skills/mc-hud/SKILL.md (if present)
      - .ai/skills/mc-screen/SKILL.md (if present)
    applies_when: |
      PR introduces a new config option, command, or player-facing feature
      (including a HUD badge or hold-to-peek detail panel) — typically a feat-typed
      change that adds a public field to the config class or a new translatable key.
      Omit for internal-only fix / chore / refactor / perf diffs players never
      observe.

  - id: performance
    name: Performance (20Hz tick budget)
    severity: must_fix
    description: |
      Per-tick allocations in hot paths. O(n²) loops over entity lists.
      Unbounded caches. Synchronous I/O on the server thread. New mixins
      on hot vanilla methods are flagged for scrutiny. In-world/particle
      rendering that skips culling, LOD, or a per-tick spawn budget.
    look_at:
      - .ai/skills/mc-world-render/SKILL.md (if present)

  - id: compat
    name: Compat risk
    severity: must_fix
    description: |
      Changes that could break optional integrations (Mod Menu, Cloth Config,
      Jade/WTHIT, EMI/REI/JEI) or sibling Concord mods consuming this mod's
      public api package. Any new public API used by compat classes. Scope is
      breakage of an EXISTING integration; omitting a NEW surface for a new
      feature is `feature_completeness`'s job, not this one.
    look_at:
      - .ai/skills/mc-public-api/SKILL.md (if present)
      - .ai/skills/mc-hud/SKILL.md (if present)
    applies_when: |
      PR touches a compat.* package, the mod's public api package, public
      APIs that compat classes import, or fabric.mod.json depends/recommends
      entries.
