# Concord default code-review criteria for member mods.
#
# Resolution order in CI: explicit `criteria-file` workflow input → the
# repo's own .ai/review-criteria.yml → this file. Copy this file into a mod
# repo's .ai/ (whole-file override) to add domain-specific criteria — e.g.
# a hot-path performance note for the mod's busiest handler.
#
# Categories are scored on a 3-level scale (pass / warn / fail → rendered as
# ✓ / ⚠ / ✗) and are informational only — none block merge.
#
# Each category may declare `applies_when` to scope it to specific diffs;
# omitting it means the category always applies.

scoring: pass_warn_fail
blocking: false

categories:
  - id: spec_alignment
    name: Spec alignment
    description: |
      Does the PR implement what the linked issue spec describes?
      Acceptance criteria covered? Anything out-of-scope sneaking in?
    look_at:
      - linked issue body (the spec posted by the claude-spec workflow)

  - id: conventions
    name: Project conventions
    description: |
      Mojang mappings (not Yarn). ResourceLocations via the mod's id()
      helper, never hand-built with an inlined mod id. Correct source set
      (main / client / gametest). Commit messages follow Conventional
      Commits with a topical scope naming the feature area (per AGENTS.md).
    look_at:
      - AGENTS.md

  - id: correctness
    name: Correctness
    description: |
      Logic bugs, off-by-ones, null/Optional handling, edge cases, error
      paths. Are loops bounded? Are early returns correct?

  - id: thread_safety
    name: Thread safety
    description: |
      Client/server boundary crossings. Shared mutable state guarded
      (ConcurrentMap, volatile, Atomic, synchronized where appropriate).
      No client-only types referenced from main source set.
    look_at:
      - .ai/skills/mc-shared-state/SKILL.md (if present)

  - id: mixin_safety
    name: Mixin safety
    description: |
      Injection point correctness. @Inject vs @Redirect vs @ModifyVariable
      choice. CallbackInfo / CallbackInfoReturnable return handling.
      Access widener scope minimized.
    look_at:
      - .ai/skills/mc-mixin-craft/SKILL.md (if present)
    applies_when: |
      PR touches *Mixin.java, a *.mixins.json file, or a *.accesswidener
      file.

  - id: test_coverage
    name: Test coverage
    description: |
      Non-trivial logic has tests. Correct tier chosen: pure JUnit for plain
      logic, fabric-loader-junit for things needing the loader, Fabric
      gametests for anything needing a live world. No mocking of Fabric APIs
      that should be exercised in a gametest.
    look_at:
      - .ai/skills/mc-mod-testing/SKILL.md (if present)
      - .ai/skills/mc-testing-mock/SKILL.md (if present)

  - id: performance
    name: Performance (20Hz tick budget)
    description: |
      Per-tick allocations in hot paths. O(n²) loops over entity lists.
      Unbounded caches. Synchronous I/O on the server thread. New mixins
      on hot vanilla methods are flagged for scrutiny.

  - id: compat
    name: Compat risk
    description: |
      Changes that could break optional integrations (Mod Menu, Cloth Config,
      Jade/WTHIT, EMI/REI/JEI) or sibling Concord mods consuming this mod's
      public api package. Any new public API used by compat classes.
    applies_when: |
      PR touches a compat.* package, the mod's public api package, public
      APIs that compat classes import, or fabric.mod.json depends/recommends
      entries.
