# Concord — reusable Claude code review for member mods.
#
# Maintains a single sticky review comment on non-draft PRs: each push edits
# the same comment in place (anchored by a hidden marker) so the PR shows only
# the latest review, headed by the commit it reviewed.
#
# Prompt/criteria resolution order (first match wins):
#   1. explicit `prompt-file` / `criteria-file` workflow inputs (paths in
#      the calling repo) — set these in the stub to use custom locations
#   2. the calling repo's .ai/prompts/code-reviewer.md / .ai/review-criteria.yml
#      (whole-file override; delete them to fall back to the suite defaults)
#   3. the suite defaults in this repo's .ai/
# AGENTS.md always comes from the calling repo. Caller stub:
#
#   name: Claude Code Review
#   on:
#     pull_request: { types: [opened, synchronize, ready_for_review, reopened] }
#   concurrency:
#     group: claude-review-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: read
#     pull-requests: write
#     issues: read
#   jobs:
#     review:
#       uses: rfizzle/concord/.github/workflows/claude-review.yml@master
#       secrets: inherit
name: Claude Code Review

on:
  workflow_call:
    inputs:
      prompt-file:
        description: "path (in the calling repo) to a custom reviewer prompt; empty = auto-resolve"
        type: string
        default: ""
      criteria-file:
        description: "path (in the calling repo) to custom review criteria; empty = auto-resolve"
        type: string
        default: ""
      model:
        type: string
        default: claude-opus-4-8
      max-budget-usd:
        type: string
        default: "5.00"
      max-turns:
        type: string
        default: "40"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Checkout concord (prompt defaults)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: rfizzle/concord
          ref: master
          path: .concord

      - name: Install Claude Code
        run: |
          # Fetch the installer to disk rather than piping the network stream
          # straight into bash: this captures the exact bytes (a truncated/MITM'd
          # response can't partially execute) and logs their digest for audit.
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          echo "claude install.sh sha256: $(sha256sum /tmp/claude-install.sh | cut -d' ' -f1)"
          # To pin against supply-chain tampering, set EXPECTED_SHA256 to the
          # logged digest once reviewed — install then fails closed on any change.
          EXPECTED_SHA256=""
          if [ -n "$EXPECTED_SHA256" ]; then
            echo "${EXPECTED_SHA256}  /tmp/claude-install.sh" | sha256sum -c - \
              || { echo "::error::claude install.sh checksum mismatch"; exit 1; }
          fi
          bash /tmp/claude-install.sh

      - name: Build review prompt
        run: |
          # Resolution: explicit input > repo-local .ai/ file > concord default.
          # An explicit input that points at a missing file is a config error.
          if [ -n "${{ inputs.prompt-file }}" ]; then
            PROMPT_FILE="${{ inputs.prompt-file }}"
            [ -f "$PROMPT_FILE" ] || { echo "::error::prompt-file '$PROMPT_FILE' not found"; exit 1; }
          else
            PROMPT_FILE=.ai/prompts/code-reviewer.md
            [ -f "$PROMPT_FILE" ] || PROMPT_FILE=.concord/.ai/prompts/code-reviewer.md
          fi
          if [ -n "${{ inputs.criteria-file }}" ]; then
            CRITERIA_FILE="${{ inputs.criteria-file }}"
            [ -f "$CRITERIA_FILE" ] || { echo "::error::criteria-file '$CRITERIA_FILE' not found"; exit 1; }
          else
            CRITERIA_FILE=.ai/review-criteria.yml
            [ -f "$CRITERIA_FILE" ] || CRITERIA_FILE=.concord/.ai/review-criteria.yml
          fi
          echo "Using prompt: $PROMPT_FILE"
          echo "Using criteria: $CRITERIA_FILE"

          DIFF="$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})"

          # Cap the inlined diff so one huge file (a deleted log, generated
          # assets) can't blow the model's context window — "Prompt is too
          # long" fails the call before a single turn. The reviewer has the
          # full checkout and git history; tell it what was cut so it can
          # read the rest itself.
          MAX_DIFF_BYTES=400000
          DIFF_BYTES=${#DIFF}
          if [ "$DIFF_BYTES" -gt "$MAX_DIFF_BYTES" ]; then
            echo "Diff is ${DIFF_BYTES} bytes; truncating inlined copy to ${MAX_DIFF_BYTES}"
            DIFF="$(printf '%s' "$DIFF" | head -c "$MAX_DIFF_BYTES")

          [INLINED DIFF TRUNCATED at ${MAX_DIFF_BYTES} of ${DIFF_BYTES} bytes.
          The working directory contains the full PR checkout with history;
          run 'git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat'
          for the full file list and diff any remaining file directly.]"
          fi
          PR_TITLE="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title --jq .title)"
          PR_BODY="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json body --jq .body)"

          # The sticky review comment from the previous push, so the reviewer
          # doesn't re-raise findings the latest push already addressed.
          PREV_REVIEW="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --json comments \
            --jq '[.comments[] | select(.body | startswith("<!-- concord-code-review -->"))] | last | .body // ""')"

          # Issue(s) this PR closes — their bodies carry the implementation spec
          # the change was built from. closingIssuesReferences captures both
          # closing keywords (Closes #N) and issues linked via the PR sidebar.
          # Reviewing against the spec catches drift the PR description misses.
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          LINKED_ISSUES="$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){closingIssuesReferences(first:10){nodes{number title body}}}}}' \
            -F owner="$OWNER" -F repo="$REPO" -F pr=${{ github.event.pull_request.number }} \
            --jq '.data.repository.pullRequest.closingIssuesReferences.nodes[] | "Issue #\(.number): \(.title)\n\n\(.body)\n"' 2>/dev/null)" || LINKED_ISSUES=""

          # Quick signal in the log: did we resolve a linked issue (whose body
          # carries the spec), or is the reviewer running on the PR alone?
          if [ -n "$LINKED_ISSUES" ]; then
            echo "Linked issue(s) resolved into review context: ${#LINKED_ISSUES} chars"
          else
            echo "::warning::No linked issue resolved — reviewing against the PR description only. Link the source issue with 'Closes #<n>' to feed the spec."
          fi

          PROMPT="$(cat "$PROMPT_FILE")

          ---
          Project conventions (from AGENTS.md):
          $(cat AGENTS.md 2>/dev/null || echo '(no AGENTS.md in this repository)')

          ---
          Categories to score (from review-criteria.yml):
          $(cat "$CRITERIA_FILE")

          ---
          HEAD commit: ${{ github.event.pull_request.head.sha }}

          PR title: ${PR_TITLE}

          PR description:
          ${PR_BODY}

          ---
          Linked issue(s) this PR closes — the implementation spec and intent
          the change was built from. Review the diff against this, not just the
          PR description; flag where the implementation drifts from the spec:
          ${LINKED_ISSUES:-(none referenced)}

          ---
          Previous review (if any) — do not repeat findings this push has
          already addressed; only carry forward items that are genuinely still
          open:
          ${PREV_REVIEW:-(none)}

          ---
          The full repository is checked out in the current working directory.
          (The .concord/ subdirectory is the suite standards repo, checked out
          for reference — it is not part of this PR.)
          Read any file you need (Read/Grep) to verify a finding before
          including it.

          Diff:
          ${DIFF}"

          echo "$PROMPT" > /tmp/review-prompt.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Surface the exact prompt sent to the model — download from the run's
      # Artifacts to confirm the linked issue body, diff, and AGENTS.md are
      # present. The prompt holds no secrets (the token is passed via env).
      - name: Upload review prompt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: review-prompt
          path: /tmp/review-prompt.txt
          if-no-files-found: warn

      - name: Run review
        run: |
          ATTEMPT=0
          MAX_ATTEMPTS=3
          # Accumulated across attempts so the reported figure is the whole
          # job's spend, not just the winning attempt.
          TOTAL_COST=0
          TOTAL_TURNS=0

          # Report dollar spend to the Actions run summary (and the log).
          report_cost() {
            echo "💲 Code review: \$${TOTAL_COST} over ${TOTAL_TURNS} turn(s) in ${ATTEMPT} attempt(s) on ${{ inputs.model }}"
            if [ -n "$GITHUB_STEP_SUMMARY" ]; then
              {
                echo "### 💲 Code review cost"
                echo ""
                echo "| Model | Cost (USD) | Turns | Attempts |"
                echo "|---|---|---|---|"
                echo "| ${{ inputs.model }} | \$${TOTAL_COST} | ${TOTAL_TURNS} | ${ATTEMPT} |"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Review attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            RESULT="$(~/.local/bin/claude -p \
              --output-format json \
              --model ${{ inputs.model }} \
              --max-turns ${{ inputs.max-turns }} \
              --max-budget-usd ${{ inputs.max-budget-usd }} \
              < /tmp/review-prompt.txt 2>/tmp/review-stderr.txt)" || true

            COST="$(echo "$RESULT" | jq -r '.total_cost_usd // 0' 2>/dev/null)" || COST=0
            TURNS="$(echo "$RESULT" | jq -r '.num_turns // 0' 2>/dev/null)" || TURNS=0
            TOTAL_COST="$(awk "BEGIN{printf \"%.4f\", ${TOTAL_COST:-0} + ${COST:-0}}")"
            TOTAL_TURNS=$((TOTAL_TURNS + ${TURNS:-0}))

            COMMENT="$(echo "$RESULT" | jq -r '.result // empty' 2>/dev/null)" || true

            if [ -n "$COMMENT" ] && echo "$COMMENT" | grep -q "## Code Review"; then
              echo "Review produced successfully on attempt ${ATTEMPT}"
              echo "$COMMENT" > /tmp/review-comment.md
              report_cost
              break
            fi

            echo "Attempt ${ATTEMPT} did not produce valid output"
            echo "--- claude stderr (tail) ---"
            tail -c 2000 /tmp/review-stderr.txt || true
            echo "--- raw result (head) ---"
            echo "$RESULT" | head -c 2000
            echo "---"
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              report_cost
              echo "::error::All ${MAX_ATTEMPTS} review attempts failed to produce valid output"
              exit 1
            fi
          done
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Post review comment
        run: |
          if [ ! -s /tmp/review-comment.md ]; then
            echo "No review comment to post"
            exit 0
          fi
          # Trim any model preamble before the "## Code Review" header.
          sed -n '/^## Code Review/,$p' /tmp/review-comment.md > /tmp/review-trimmed.md
          [ -s /tmp/review-trimmed.md ] || cp /tmp/review-comment.md /tmp/review-trimmed.md

          # Hidden marker anchors the sticky comment: the body must start with
          # it so the find-and-edit lookup (and next run's PREV_REVIEW) match.
          MARKER="<!-- concord-code-review -->"
          SHA="${{ github.event.pull_request.head.sha }}"
          {
            echo "$MARKER"
            echo "_Reviewed at \`${SHA:0:7}\` · $(date -u '+%Y-%m-%d %H:%M UTC')_"
            echo
            cat /tmp/review-trimmed.md
          } > /tmp/review-body.md

          PR=${{ github.event.pull_request.number }}
          REPO=${{ github.repository }}

          # Edit the existing sticky comment in place if one exists, else create
          # it. --paginate applies --jq per page, so emit one id per match and
          # take the last rather than relying on jq's `last` across pages.
          COMMENT_ID="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | tail -n1)"

          # GitHub's API occasionally returns transient 401s — retry with backoff.
          for i in 1 2 3; do
            if [ -n "$COMMENT_ID" ]; then
              if gh api -X PATCH "repos/$REPO/issues/comments/$COMMENT_ID" \
                -F body=@/tmp/review-body.md >/dev/null; then
                echo "Updated sticky review comment $COMMENT_ID"
                exit 0
              fi
            else
              if gh pr comment "$PR" --repo "$REPO" --body-file /tmp/review-body.md; then
                echo "Created sticky review comment"
                exit 0
              fi
            fi
            echo "Post attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::Failed to post review comment after 3 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
