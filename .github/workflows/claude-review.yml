# Concord — reusable Claude code review for member mods.
#
# Posts a structured review comment on non-draft PRs.
#
# Prompt/criteria resolution order (first match wins):
#   1. explicit `prompt-file` / `criteria-file` workflow inputs (paths in
#      the calling repo) — set these in the stub to use custom locations
#   2. the calling repo's .ai/prompts/code-reviewer.md / .ai/review-criteria.yml
#      (whole-file override; delete them to fall back to the suite defaults)
#   3. the suite defaults in this repo's .ai/
# AGENTS.md always comes from the calling repo. Caller stub:
#
#   name: Claude Code Review
#   on:
#     pull_request: { types: [opened, synchronize, ready_for_review, reopened] }
#   concurrency:
#     group: claude-review-${{ github.event.pull_request.number }}
#     cancel-in-progress: true
#   permissions:
#     contents: read
#     pull-requests: write
#     issues: read
#   jobs:
#     review:
#       uses: rfizzle/concord/.github/workflows/claude-review.yml@master
#       secrets: inherit
name: Claude Code Review

on:
  workflow_call:
    inputs:
      prompt-file:
        description: "path (in the calling repo) to a custom reviewer prompt; empty = auto-resolve"
        type: string
        default: ""
      criteria-file:
        description: "path (in the calling repo) to custom review criteria; empty = auto-resolve"
        type: string
        default: ""
      max-budget-usd:
        type: string
        default: "3.00"
      max-turns:
        type: string
        default: "25"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout concord (prompt defaults)
        uses: actions/checkout@v4
        with:
          repository: rfizzle/concord
          ref: master
          path: .concord

      - name: Install Claude Code
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Build review prompt
        run: |
          # Resolution: explicit input > repo-local .ai/ file > concord default.
          # An explicit input that points at a missing file is a config error.
          if [ -n "${{ inputs.prompt-file }}" ]; then
            PROMPT_FILE="${{ inputs.prompt-file }}"
            [ -f "$PROMPT_FILE" ] || { echo "::error::prompt-file '$PROMPT_FILE' not found"; exit 1; }
          else
            PROMPT_FILE=.ai/prompts/code-reviewer.md
            [ -f "$PROMPT_FILE" ] || PROMPT_FILE=.concord/.ai/prompts/code-reviewer.md
          fi
          if [ -n "${{ inputs.criteria-file }}" ]; then
            CRITERIA_FILE="${{ inputs.criteria-file }}"
            [ -f "$CRITERIA_FILE" ] || { echo "::error::criteria-file '$CRITERIA_FILE' not found"; exit 1; }
          else
            CRITERIA_FILE=.ai/review-criteria.yml
            [ -f "$CRITERIA_FILE" ] || CRITERIA_FILE=.concord/.ai/review-criteria.yml
          fi
          echo "Using prompt: $PROMPT_FILE"
          echo "Using criteria: $CRITERIA_FILE"

          DIFF="$(gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }})"

          # Cap the inlined diff so one huge file (a deleted log, generated
          # assets) can't blow the model's context window — "Prompt is too
          # long" fails the call before a single turn. The reviewer has the
          # full checkout and git history; tell it what was cut so it can
          # read the rest itself.
          MAX_DIFF_BYTES=400000
          DIFF_BYTES=${#DIFF}
          if [ "$DIFF_BYTES" -gt "$MAX_DIFF_BYTES" ]; then
            echo "Diff is ${DIFF_BYTES} bytes; truncating inlined copy to ${MAX_DIFF_BYTES}"
            DIFF="$(printf '%s' "$DIFF" | head -c "$MAX_DIFF_BYTES")

          [INLINED DIFF TRUNCATED at ${MAX_DIFF_BYTES} of ${DIFF_BYTES} bytes.
          The working directory contains the full PR checkout with history;
          run 'git diff origin/${{ github.event.pull_request.base.ref }}...HEAD --stat'
          for the full file list and diff any remaining file directly.]"
          fi
          PR_TITLE="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json title --jq .title)"
          PR_BODY="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json body --jq .body)"

          # Most recent prior review by this bot, so the reviewer doesn't
          # re-raise findings the latest push already addressed.
          PREV_REVIEW="$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} \
            --json comments \
            --jq '[.comments[] | select(.body | startswith("## Code Review"))] | last | .body // ""')"

          PROMPT="$(cat "$PROMPT_FILE")

          ---
          Project conventions (from AGENTS.md):
          $(cat AGENTS.md 2>/dev/null || echo '(no AGENTS.md in this repository)')

          ---
          Categories to score (from review-criteria.yml):
          $(cat "$CRITERIA_FILE")

          ---
          HEAD commit: ${{ github.event.pull_request.head.sha }}

          PR title: ${PR_TITLE}

          PR description:
          ${PR_BODY}

          ---
          Previous review (if any) — do not repeat findings this push has
          already addressed; only carry forward items that are genuinely still
          open:
          ${PREV_REVIEW:-(none)}

          ---
          The full repository is checked out in the current working directory.
          (The .concord/ subdirectory is the suite standards repo, checked out
          for reference — it is not part of this PR.)
          Read any file you need (Read/Grep) to verify a finding before
          including it.

          Diff:
          ${DIFF}"

          echo "$PROMPT" > /tmp/review-prompt.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run review
        run: |
          ATTEMPT=0
          MAX_ATTEMPTS=3

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Review attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            RESULT="$(~/.local/bin/claude -p \
              --output-format json \
              --max-turns ${{ inputs.max-turns }} \
              --max-budget-usd ${{ inputs.max-budget-usd }} \
              < /tmp/review-prompt.txt 2>/tmp/review-stderr.txt)" || true

            COMMENT="$(echo "$RESULT" | jq -r '.result // empty' 2>/dev/null)" || true

            if [ -n "$COMMENT" ] && echo "$COMMENT" | grep -q "## Code Review"; then
              echo "Review produced successfully on attempt ${ATTEMPT}"
              echo "$COMMENT" > /tmp/review-comment.md
              break
            fi

            echo "Attempt ${ATTEMPT} did not produce valid output"
            echo "--- claude stderr (tail) ---"
            tail -c 2000 /tmp/review-stderr.txt || true
            echo "--- raw result (head) ---"
            echo "$RESULT" | head -c 2000
            echo "---"
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "::error::All ${MAX_ATTEMPTS} review attempts failed to produce valid output"
              exit 1
            fi
          done
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Post review comment
        run: |
          if [ ! -s /tmp/review-comment.md ]; then
            echo "No review comment to post"
            exit 0
          fi
          # Trim any model preamble before the "## Code Review" header so the
          # next run's previous-review lookup (startswith) can find this one.
          sed -n '/^## Code Review/,$p' /tmp/review-comment.md > /tmp/review-trimmed.md
          [ -s /tmp/review-trimmed.md ] || cp /tmp/review-comment.md /tmp/review-trimmed.md
          # GitHub's API occasionally returns transient 401s — retry with backoff.
          for i in 1 2 3; do
            if gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body-file /tmp/review-trimmed.md; then
              exit 0
            fi
            echo "Post attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::Failed to post review comment after 3 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
