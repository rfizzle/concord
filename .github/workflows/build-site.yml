# Concord — reusable site build & deploy workflow.
#
# Called by each member mod repo's .github/workflows/site.yml. The deploy job
# needs Pages + id-token write, which a reusable workflow cannot add to the
# caller's token — so the calling site.yml must grant them:
#
#   permissions:
#     contents: read
#     pages: write
#     id-token: write
#   jobs:
#     site:
#       uses: rfizzle/concord/.github/workflows/build-site.yml@master
#
# Builds the mod's site/ content with the shared template in this repo and
# deploys it to GitHub Pages (Pages source must be set to "GitHub Actions"
# in the calling repo's settings).
name: Build & deploy mod site

on:
  workflow_call:
    inputs:
      concord-ref:
        description: "concord ref to build with (pin to a tag to freeze the template)"
        type: string
        default: master
      site-dir:
        description: "content directory in the calling repo"
        type: string
        default: site

jobs:
  build:
    runs-on: ubuntu-latest
    # Build only reads the repo and uploads a Pages artifact; it needs neither
    # pages: write nor id-token: write. Deploy (below) narrows to those. Without
    # this cap the build job inherits the caller's full grant — id-token: write
    # in particular — and hands it to the unpinned `npx eleventy` dependency tree.
    permissions:
      contents: read
    steps:
      - name: Checkout mod repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Checkout concord (shared template)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: rfizzle/concord
          ref: ${{ inputs.concord-ref }}
          path: .concord

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Generate changelog page
        # Derive site/pages/changelog.json from the mod's committed changelogs/*
        # unioned with its GitHub Releases, before eleventy reads the pages. A
        # no-op unless site.json's nav includes "changelog". GITHUB_REPOSITORY is
        # the calling mod repo; the token only raises the releases-API rate limit.
        env:
          SITE_DIR: ${{ github.workspace }}/${{ inputs.site-dir }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node "$GITHUB_WORKSPACE/.concord/template/scripts/gen-changelog.cjs" "$SITE_DIR"

      - name: Build site
        env:
          SITE_DIR: ${{ github.workspace }}/${{ inputs.site-dir }}
        run: |
          npx -y @11ty/eleventy@3.0.0 \
            --config="$GITHUB_WORKSPACE/.concord/template/eleventy.config.cjs" \
            --input="$GITHUB_WORKSPACE/.concord/template/src" \
            --output="$GITHUB_WORKSPACE/_site"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-1.outputs.page_url || steps.deployment-retry-2.outputs.page_url }}
    steps:
      - name: Configure Pages (auto-enable with Actions source)
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      # The Pages service occasionally rejects a deployment with a transient
      # "Deployment failed, try again later" error even when the artifact is
      # fine. Retry up to two more times, with a pause for the service to
      # settle, before failing the job for real.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Deploy to GitHub Pages (retry 1)
        id: deployment-retry-1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before final retry
        if: steps.deployment-retry-1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages (retry 2)
        id: deployment-retry-2
        if: steps.deployment-retry-1.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
