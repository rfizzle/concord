# Concord — reusable site build & deploy workflow.
#
# Called by each member mod repo's .github/workflows/site.yml:
#
#   jobs:
#     site:
#       uses: rfizzle/concord/.github/workflows/build-site.yml@master
#
# Builds the mod's site/ content with the shared template in this repo and
# deploys it to GitHub Pages (Pages source must be set to "GitHub Actions"
# in the calling repo's settings).
name: Build & deploy mod site

on:
  workflow_call:
    inputs:
      concord-ref:
        description: "concord ref to build with (pin to a tag to freeze the template)"
        type: string
        default: master
      site-dir:
        description: "content directory in the calling repo"
        type: string
        default: site

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mod repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout concord (shared template)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: rfizzle/concord
          ref: ${{ inputs.concord-ref }}
          path: .concord

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate changelog page
        # Derive site/pages/changelog.json from the mod's committed changelogs/*
        # unioned with its GitHub Releases, before eleventy reads the pages. A
        # no-op unless site.json's nav includes "changelog". GITHUB_REPOSITORY is
        # the calling mod repo; the token only raises the releases-API rate limit.
        env:
          SITE_DIR: ${{ github.workspace }}/${{ inputs.site-dir }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node "$GITHUB_WORKSPACE/.concord/template/scripts/gen-changelog.cjs" "$SITE_DIR"

      - name: Build site
        env:
          SITE_DIR: ${{ github.workspace }}/${{ inputs.site-dir }}
        run: |
          npx -y @11ty/eleventy@3.0.0 \
            --config="$GITHUB_WORKSPACE/.concord/template/eleventy.config.cjs" \
            --input="$GITHUB_WORKSPACE/.concord/template/src" \
            --output="$GITHUB_WORKSPACE/_site"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages (auto-enable with Actions source)
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
