# Concord — reusable PR build-artifact workflow for member mods.
#
# A maintainer comments `/build` on a PR; the workflow builds that PR's
# head commit and uploads the mod jar as a downloadable artifact, with
# dedup per commit. Mod id defaults to the repository name. Caller stub:
#
#   name: Build Artifact
#   on:
#     issue_comment: { types: [created] }
#   concurrency:
#     group: build-artifact-${{ github.event.issue.number }}
#     cancel-in-progress: false
#   permissions:
#     contents: read
#     pull-requests: write
#     issues: write
#     actions: read
#   jobs:
#     build:
#       uses: rfizzle/concord/.github/workflows/mod-build-artifact.yml@master
#       secrets: inherit
name: Mod Build Artifact

on:
  workflow_call:
    inputs:
      mod-id:
        description: "jar prefix / mod id (defaults to the repository name)"
        type: string
        default: ""

env:
  MOD_ID: ${{ inputs.mod-id || github.event.repository.name }}

jobs:
  build:
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/build') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    # Reads the PR/commit, reacts to and comments on the triggering comment, and
    # uploads the built jar as an artifact. Cap the token to exactly that so an
    # over-broad caller stub can't widen it.
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Validate command
        id: validate
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [[ "$COMMENT_BODY" =~ (^|[[:space:]])/build($|[[:space:]]|$'\n') ]]; then
            echo "Valid /build command"
          else
            echo "::error::Comment does not contain a valid /build command"
            exit 1
          fi

      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='eyes'

      - name: Get PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_JSON=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json headRefOid,headRefName)
          SHA=$(echo "$PR_JSON" | jq -r .headRefOid)
          BRANCH=$(echo "$PR_JSON" | jq -r .headRefName)
          if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
            echo "::error::Failed to resolve PR head SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Check for existing build
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr view "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '.comments[]
              | select(.author.login == "github-actions[bot]")
              | select(.body | test("Build artifact ready"))
              | select(.body | test("${{ steps.pr.outputs.sha }}"))
              | .body' \
            | head -1)
          if [ -n "$EXISTING" ]; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip duplicate build
        if: steps.dedup.outputs.already_built == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.pr.outputs.sha }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "Artifact for commit \`$SHA\` was already built — see earlier comment above."

      - name: Checkout
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Set up JDK 21
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        if: steps.dedup.outputs.already_built != 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        if: steps.dedup.outputs.already_built != 'true'
        run: chmod +x ./gradlew

      - name: Build
        if: steps.dedup.outputs.already_built != 'true'
        run: ./gradlew build --no-daemon

      - name: Get mod version
        if: steps.dedup.outputs.already_built != 'true'
        id: version
        run: |
          # printVersion runs the PR's gradle; constrain to a single line so a
          # malicious multiline value can't inject additional step outputs.
          VER="$(./gradlew -q printVersion --no-daemon | head -n1)"
          echo "mod_version=$VER" >> "$GITHUB_OUTPUT"

      - name: Upload JAR
        if: steps.dedup.outputs.already_built != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.MOD_ID }}-${{ steps.version.outputs.mod_version }}-pr${{ github.event.issue.number }}
          path: |
            build/libs/${{ env.MOD_ID }}-*.jar
            !build/libs/${{ env.MOD_ID }}-*-sources.jar
            !build/libs/${{ env.MOD_ID }}-*-dev.jar
          retention-days: 7
          if-no-files-found: error

      - name: Comment with artifact link
        if: steps.dedup.outputs.already_built != 'true'
        # Pass user-influenced values (the PR branch name and the gradle-derived
        # version, both controllable by the PR author) through env, never inline
        # ${{ }} in the script: an inline expression is substituted before the
        # shell parses the line, so a branch named `$(...)`/with backticks would
        # execute. Referencing "$BRANCH" keeps it inert data.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.version.outputs.mod_version }}
          SHA: ${{ steps.pr.outputs.sha }}
          BRANCH: ${{ steps.pr.outputs.branch }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "**Build artifact ready** :package:

          | | |
          |---|---|
          | **Version** | \`$VERSION\` |
          | **Commit** | \`$SHA\` |
          | **Branch** | \`$BRANCH\` |
          | **Download** | [Workflow Run]($RUN_URL) |

          Artifact: \`${MOD_ID}-${VERSION}-pr${PR_NUMBER}\` (retained 7 days)"

      - name: React with rocket on success
        if: steps.dedup.outputs.already_built != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method POST \
            "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content='rocket'

      - name: Comment on failure
        if: failure() && steps.validate.outcome == 'success' && steps.dedup.outputs.already_built != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.pr.outputs.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --body "**Build failed** :x:

          [View build logs]($RUN_URL)

          Commit: \`$SHA\`"
