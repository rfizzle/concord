# Guards the workflow-stub checker itself: whenever the canonical manifest, the
# checker, or its tests change, run the checker's unit tests so a regression in
# the drift logic can't merge. This is hermetic (no member repos) — the live
# member drift scan is stub-drift.yml, which runs on a schedule.
name: Workflow stub checker

on:
  pull_request:
    paths:
      - "workflow-stubs.json"
      - "scripts/check-workflow-stubs.py"
      - "scripts/test_check_workflow_stubs.py"
      - ".github/workflows/stub-check.yml"
  push:
    branches: [master]
    paths:
      - "workflow-stubs.json"
      - "scripts/check-workflow-stubs.py"
      - "scripts/test_check_workflow_stubs.py"
      - ".github/workflows/stub-check.yml"

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Ensure PyYAML
        run: python3 -c "import yaml" 2>/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml; }
      - name: Run stub-checker unit tests
        run: python3 -m unittest scripts.test_check_workflow_stubs
