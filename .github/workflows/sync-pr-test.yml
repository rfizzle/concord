# Guards scripts/open-sync-pr.sh — the script propagate.yml runs to stage
# concord-owned files (issue templates, AGENTS.md/.gitignore regions, and the
# vendored .ai/skills + .ai/commands trees) onto each member's concord-sync PR.
# A regression here writes wrong content — or wrong deletions — across every
# member repo, so exercise the add/update/delete and .concord-rev logic against a
# mock gh before it can merge. Hermetic: no network, jq + python3 only.
name: Sync PR script tests

on:
  pull_request:
    paths:
      - "scripts/open-sync-pr.sh"
      - "scripts/test_open_sync_pr.py"
      - ".github/workflows/sync-pr-test.yml"
  push:
    branches: [master]
    paths:
      - "scripts/open-sync-pr.sh"
      - "scripts/test_open_sync_pr.py"
      - ".github/workflows/sync-pr-test.yml"

permissions:
  contents: read

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run sync-PR integration tests
        run: python3 -m unittest scripts.test_open_sync_pr
