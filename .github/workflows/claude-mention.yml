# Concord — reusable @claude mention handler for member mods.
#
# Invokes Claude Code on any issue/PR comment, review, or new issue that
# mentions @claude. Caller stub:
#
#   name: Claude
#   on:
#     issue_comment: { types: [created] }
#     pull_request_review_comment: { types: [created] }
#     pull_request_review: { types: [submitted] }
#     issues: { types: [opened, assigned] }
#   concurrency:
#     group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
#     cancel-in-progress: false
#   permissions:
#     contents: write
#     pull-requests: write
#     issues: write
#     id-token: write
#     actions: read
#   jobs:
#     claude:
#       uses: rfizzle/concord/.github/workflows/claude-mention.yml@master
#       secrets: inherit
name: Claude Mention

on:
  workflow_call:
    inputs:
      model:
        type: string
        default: claude-opus-4-8
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    if: |
      github.event.sender.type != 'Bot' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Standing guidance so review fixes converge instead of spawning a
          # fix-per-finding push chain that the next review re-reviews:
          #  - batch all edits for one request into a single commit
          #  - self-review the diff and build/test before pushing, so a fix
          #    doesn't introduce the next review's findings
          #  - act only on 🔴 Must fix items; leave 🟡 Optional polish alone
          # Appended (not --system-prompt) so Claude Code's default agent
          # behavior is preserved. Keep this a single line — claude_args is
          # shell-split, so an embedded newline would break the passthrough.
          claude_args: |
            --model ${{ inputs.model }}
            --max-turns 40
            --max-budget-usd 5.00
            --append-system-prompt "When your change modifies code, make all edits for one request in a single commit. Before committing, self-review your own diff as a skeptical reviewer would: re-read every change and look for regressions, broken edge cases, thread-safety mistakes, and test-timing or test-correctness bugs you may have just introduced, and fix anything you find. Then run the project build and tests (e.g. ./gradlew build) and push only when both the self-review and the build are clean; do not push on failure. When addressing a code review comment, fix only the 🔴 Must fix items unless explicitly asked to do more, and leave 🟡 Optional items untouched."

      - name: Report cost
        # Informational only — never fail the job over cost reporting, and run
        # even when the Claude step errored so a partial spend is still shown.
        if: always()
        run: |
          FILE="${{ steps.claude.outputs.execution_file }}"
          if [ -z "$FILE" ] || [ ! -s "$FILE" ]; then
            echo "No execution file to read cost from"
            exit 0
          fi
          # Recurse the execution log for the final result's cost/turns.
          COST="$(jq -rs '[.. | objects | .total_cost_usd? // empty] | last // 0' "$FILE" 2>/dev/null)" || COST=0
          TURNS="$(jq -rs '[.. | objects | .num_turns? // empty] | last // 0' "$FILE" 2>/dev/null)" || TURNS=0
          echo "💲 Claude mention: \$${COST} over ${TURNS} turn(s) on ${{ inputs.model }}"
          if [ -n "$GITHUB_STEP_SUMMARY" ]; then
            {
              echo "### 💲 Claude mention cost"
              echo ""
              echo "| Model | Cost (USD) | Turns |"
              echo "|---|---|---|"
              echo "| ${{ inputs.model }} | \$${COST} | ${TURNS} |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
