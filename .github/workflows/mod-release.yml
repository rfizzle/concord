# Concord — reusable release workflow for member mods.
#
# Builds on a v* tag push and creates a GitHub Release with the mod jar
# (sources/dev jars excluded). The release is assembled as a draft, the jar
# is attached, then the draft is published — this is the only order that works
# on repositories with immutable releases enabled, where assets must be
# uploaded before a release is published. Mod id defaults to the repository
# name — the suite convention is repo name == mod id == jar prefix. Caller stub:
#
#   name: Release
#   on:
#     push: { tags: ["v*"] }
#   permissions:
#     contents: write
#   jobs:
#     release:
#       uses: rfizzle/concord/.github/workflows/mod-release.yml@master
#       secrets: inherit
name: Mod Release

on:
  workflow_call:
    inputs:
      mod-id:
        description: "jar prefix / mod id (defaults to the repository name)"
        type: string
        default: ""

env:
  MOD_ID: ${{ inputs.mod-id || github.event.repository.name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build

      - name: Derive release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "title=${MOD_ID^} v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage distributable jar
        # action-gh-release treats each files: line as an independent glob; a
        # leading ! is not a negation, so build/libs/<mod>-*.jar would also match
        # the sources and dev jars. Copy only the distributable jar into a clean
        # dir and upload from there instead.
        run: |
          mkdir -p dist
          shopt -s nullglob
          found=0
          for f in build/libs/${MOD_ID}-*.jar; do
            case "$f" in
              *-sources.jar|*-dev.jar) continue ;;
            esac
            cp "$f" dist/
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No distributable jar found in build/libs for ${MOD_ID}"
            exit 1
          fi
          ls -l dist/

      - name: Create draft GitHub Release
        # Created as a draft so the jar can be attached: repositories with
        # immutable releases enabled reject asset uploads after publish. The
        # Publish step below flips the draft to published once the jar is on it.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.meta.outputs.title }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: dist/${{ env.MOD_ID }}-*.jar

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false
