# Concord — reusable release workflow for member mods.
#
# On a v* tag push: builds the mod, writes player-facing release notes, cuts a
# GitHub Release with the mod jar attached (sources/dev jars excluded), and —
# when the matching token is present — publishes the same jar and notes to
# Modrinth (MODRINTH_TOKEN) and CurseForge (CURSEFORGE_TOKEN + curseforge-id)
# with direct REST calls to each platform's upload API. A platform whose token
# or id is absent is skipped, so a member can release to GitHub alone, or to
# GitHub plus either platform. Release notes are generated by Claude from
# GitHub's factual merged-PR list, then published as that prose alone — no
# commit/PR list, contributor roll, or compare links. The raw list becomes the
# body only as a fallback when the model or its token is unavailable.
#
# Game versions and loaders are pinned via inputs (default 1.21.1 / fabric, the
# suite target) rather than read from fabric.mod.json, so a "~1.21.1" metadata
# range can't fan a single release out across every 1.21.x patch. The Modrinth
# supported-environment tag is likewise an input (default client_and_server),
# overridable per mod for a client-only or server-only member.
#
# Optional dependencies are read from fabric.mod.json's suggests/recommends and
# attached to both listings. A mod id whose platform slug differs from its
# Fabric id is remapped through a repo-local .github/release-slug-overrides.json
# (e.g. roughlyenoughitems -> rei / roughly-enough-items). Dependencies are
# best-effort: an unresolvable slug is dropped with a warning, never a failure.
#
# The release is assembled as a draft, the jar is attached, then the draft is
# published — the only order that works on repositories with immutable releases
# enabled, where assets must be uploaded before a release is published.
#
# Re-runs are safe and every surface shows identical notes. The published GitHub
# release body is the source of truth for a tag: once it exists, a re-run reuses
# that exact body for Modrinth, CurseForge, and the committed changelog instead
# of regenerating it, so a re-run after the notes cache has evicted can't drift
# (no second model spend either). The tag-keyed notes cache serves the same body
# within its retention window. Each publish target skips work that already
# landed: an existing published GitHub release and an existing Modrinth version
# are detected and skipped, and CurseForge, the last step, only runs when it
# hasn't yet succeeded. A release that failed partway — e.g. CurseForge alone —
# is completed cleanly by re-running the failed job.
#
# Mod id defaults to the repository name — the suite convention is
# repo name == mod id == jar prefix. Note generation reuses the suite's
# CLAUDE_CODE_OAUTH_TOKEN (inherited). Caller stub:
#
#   name: Release
#   on:
#     push: { tags: ["v*"] }
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     release:
#       uses: rfizzle/concord/.github/workflows/mod-release.yml@master
#       secrets: inherit
name: Mod Release

on:
  workflow_call:
    inputs:
      mod-id:
        description: "jar prefix / mod id (defaults to the repository name)"
        type: string
        default: ""
      model:
        description: "Claude model used to write the release notes"
        type: string
        default: claude-sonnet-4-6
      changelog-max-budget-usd:
        type: string
        default: "5.00"
      changelog-max-turns:
        type: string
        default: "30"
      modrinth-id:
        description: "Modrinth project slug or id (defaults to the mod id)"
        type: string
        default: ""
      curseforge-id:
        description: "CurseForge numeric project id (blank disables CurseForge)"
        type: string
        default: ""
      game-versions:
        description: "Comma-separated Minecraft versions to tag the release with"
        type: string
        default: "1.21.1"
      loaders:
        description: "Comma-separated mod loaders to tag the release with"
        type: string
        default: "fabric"
      environment:
        description: >-
          Modrinth supported environment (client_and_server, client_only,
          server_only, client_only_server_optional, dedicated_server_only, …)
        type: string
        default: "client_and_server"
      concord-ref:
        description: "concord ref to load the publish script from (pin to freeze it)"
        type: string
        default: master
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        # Optional: when absent the release body falls back to GitHub's raw
        # auto-generated notes, so a member without the token still releases.
        required: false
      MODRINTH_TOKEN:
        # Optional: a Modrinth PAT with the "Create versions" scope. Absent ->
        # the Modrinth publish step self-skips; the GitHub Release is still cut,
        # so a member without it still releases.
        required: false
      CURSEFORGE_TOKEN:
        # Optional: a CurseForge author upload token (account API token, not the
        # restricted Core/Eternal read key). Needs curseforge-id set to publish;
        # absent or unset -> the CurseForge publish step self-skips.
        required: false

env:
  MOD_ID: ${{ inputs.mod-id || github.event.repository.name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # The final step records AI-generated notes by opening and merging a
      # one-file PR (member master requires a PR, 0 approvals / 0 checks). The
      # CALLER stub must grant pull-requests: write too — a reusable workflow can
      # only narrow the GITHUB_TOKEN, never widen it, so declaring it here alone
      # is not enough.
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        # The pushed tag is the single source of version truth: inject it as the
        # gradle mod_version so the built jar's version is exactly the tag. Mods
        # keep mod_version=0.0.0 in gradle.properties as the local/dev base,
        # which surfaces as 0.0.0+g<sha> off git when no tag is injected.
        run: ./gradlew build -Pmod_version="${GITHUB_REF_NAME#v}"

      - name: Derive release metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "title=${MOD_ID^} v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stage distributable jar
        # action-gh-release treats each files: line as an independent glob; a
        # leading ! is not a negation, so build/libs/<mod>-*.jar would also match
        # the sources and dev jars. Copy only the distributable jar into a clean
        # dir and upload from there instead.
        run: |
          mkdir -p dist
          shopt -s nullglob
          found=0
          for f in build/libs/${MOD_ID}-*.jar; do
            case "$f" in
              *-sources.jar|*-dev.jar) continue ;;
            esac
            cp "$f" dist/
            found=1
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::No distributable jar found in build/libs for ${MOD_ID}"
            exit 1
          fi
          ls -l dist/

      - name: Restore cached release notes
        id: notescache
        # Keyed on the immutable tag, so a re-run of a partially-failed release
        # restores the exact same body instead of regenerating it — identical
        # notes across platforms and no second model spend. The cache is written
        # in this action's post step (on a miss) even when the job later fails,
        # so the body produced by the first attempt survives for the re-run.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/release-body.md
          key: release-notes-${{ github.ref_name }}

      - name: Reuse published release body
        id: published
        if: steps.notescache.outputs.cache-hit != 'true'
        # The published GitHub release body is the source of truth for a tag's
        # notes. On a re-run after the notes cache has evicted, reuse that body
        # verbatim rather than regenerating it, so Modrinth, CurseForge, and the
        # committed changelogs/<version>.md stay identical to what GitHub shows.
        # No published release yet on the first run, so generation proceeds below.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
               --json isDraft,body --jq 'select(.isDraft == false) | .body' \
               > /tmp/published-body.md 2>/dev/null && [ -s /tmp/published-body.md ]; then
            cp /tmp/published-body.md /tmp/release-body.md
            echo "reused=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Reusing the published $GITHUB_REF_NAME release body"
          else
            echo "reused=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect manual changelog
        id: manual
        if: steps.notescache.outputs.cache-hit != 'true' && steps.published.outputs.reused != 'true'
        # A hand-written changelogs/<version>.md is authoritative: when present it
        # is published verbatim and the model is not run. This lets a milestone
        # release (e.g. 1.0.0) ship curated notes instead of AI-rewritten PRs.
        # Absent, the pipeline falls through to the AI notes as normal.
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if [ -s "changelogs/${VERSION}.md" ]; then
            cp "changelogs/${VERSION}.md" /tmp/manual-notes.md
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "📝 Using hand-written changelogs/${VERSION}.md"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No changelogs/${VERSION}.md; generating release notes"
          fi

      - name: Gather changelog source
        if: steps.notescache.outputs.cache-hit != 'true' && steps.published.outputs.reused != 'true' && steps.manual.outputs.present != 'true'
        # GitHub's own note generator is the factual ground truth — the real list
        # of merged PRs with the previous tag auto-detected. Claude rewrites it
        # below, and it is also the fallback body if the model is unavailable.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${GITHUB_REF_NAME}" --jq '.body' \
              > /tmp/gh-notes.md 2>/tmp/gh-notes-err.txt; then
            echo "Gathered $(wc -l < /tmp/gh-notes.md) line(s) of source notes"
          else
            echo "::warning::Could not generate source notes"
            tail -c 500 /tmp/gh-notes-err.txt || true
            : > /tmp/gh-notes.md
          fi

      - name: Detect Claude auth
        id: auth
        if: steps.notescache.outputs.cache-hit != 'true' && steps.published.outputs.reused != 'true' && steps.manual.outputs.present != 'true'
        # secrets context is not usable in a step `if:`, so map presence of the
        # token to a step output the changelog steps can gate on.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No CLAUDE_CODE_OAUTH_TOKEN; using GitHub's raw changelog"
          fi

      - name: Install Claude Code
        if: steps.notescache.outputs.cache-hit != 'true' && steps.auth.outputs.available == 'true'
        run: |
          # Fetch the installer to disk rather than piping the network stream
          # straight into bash: this captures the exact bytes (a truncated/MITM'd
          # response can't partially execute) and logs their digest for audit.
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          echo "claude install.sh sha256: $(sha256sum /tmp/claude-install.sh | cut -d' ' -f1)"
          bash /tmp/claude-install.sh

      - name: Write release notes
        if: steps.notescache.outputs.cache-hit != 'true' && steps.auth.outputs.available == 'true'
        # Self-contained prompt: the merged-PR list is embedded, so the model
        # only rewrites what it is given and needs no tools. A failed or empty
        # run leaves /tmp/ai-notes.md absent and the next step uses the raw list.
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          MODEL: ${{ inputs.model }}
          MAX_TURNS: ${{ inputs.changelog-max-turns }}
          MAX_BUDGET: ${{ inputs.changelog-max-budget-usd }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          MOD_NAME="${MOD_ID^}"
          {
            cat <<EOF
          You are writing the public release notes for "${MOD_NAME}" v${VERSION}, a
          Vanilla+ Minecraft mod in the Concord collection.

          Rewrite the merged pull requests below into concise, friendly,
          player-facing release notes:
          - Open with one or two sentences on what this release is about.
          - Then group changes under "## Added", "## Changed", and "## Fixed".
            Omit any section that would be empty.
          - Write for players, not developers: no commit hashes, PR numbers,
            author handles, branch names, or internal/CI/build jargon.
          - Describe ONLY changes present in the list below — never invent, infer,
            or embellish features.
          - Keep it tight: a handful of bullets per section at most.
          Output only the Markdown release notes, with no preamble or sign-off.

          --- BEGIN MERGED PULL REQUESTS ---
          EOF
            cat /tmp/gh-notes.md
            cat <<'EOF'
          --- END MERGED PULL REQUESTS ---
          EOF
          } > /tmp/changelog-prompt.txt

          RESULT="$(~/.local/bin/claude -p \
            --output-format json \
            --model "$MODEL" \
            --max-turns "$MAX_TURNS" \
            --max-budget-usd "$MAX_BUDGET" \
            < /tmp/changelog-prompt.txt 2>/tmp/changelog-stderr.txt)" || true

          NOTES="$(printf '%s' "$RESULT" | jq -r '.result // empty' 2>/dev/null)" || true
          COST="$(printf '%s' "$RESULT" | jq -r '.total_cost_usd // 0' 2>/dev/null)" || COST=0
          TURNS="$(printf '%s' "$RESULT" | jq -r '.num_turns // 0' 2>/dev/null)" || TURNS=0

          if [ -n "$NOTES" ]; then
            printf '%s\n' "$NOTES" > /tmp/ai-notes.md
            echo "✅ Wrote release notes (\$${COST}, ${TURNS} turn(s), ${MODEL})"
            if [ -n "$GITHUB_STEP_SUMMARY" ]; then
              {
                echo "### 💲 Release notes"
                echo ""
                echo "| Model | Cost (USD) | Turns |"
                echo "|---|---|---|"
                echo "| ${MODEL} | \$${COST} | ${TURNS} |"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "::warning::Release-note model produced no output; falling back to raw notes"
            tail -c 1000 /tmp/changelog-stderr.txt || true
          fi

      - name: Assemble release body
        if: steps.notescache.outputs.cache-hit != 'true' && steps.published.outputs.reused != 'true'
        # Always produces /tmp/release-body.md so the release step has a body
        # regardless of whether the model ran. A hand-written changelog wins when
        # present; otherwise the published notes are the AI's player-facing prose
        # alone — no commit/PR list, contributor roll, or compare links. The raw
        # merged-PR list is used only as the fallback body when the model was
        # unavailable, never appended to the prose.
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if [ -s /tmp/manual-notes.md ]; then
            cp /tmp/manual-notes.md /tmp/release-body.md
          elif [ -s /tmp/ai-notes.md ]; then
            cp /tmp/ai-notes.md /tmp/release-body.md
          elif [ -s /tmp/gh-notes.md ]; then
            cp /tmp/gh-notes.md /tmp/release-body.md
          else
            printf '%s v%s\n' "${MOD_ID^}" "$VERSION" > /tmp/release-body.md
          fi
          echo "--- release body ---"
          cat /tmp/release-body.md

      - name: Detect existing release
        id: rel
        # Idempotency for re-runs: if a published (non-draft) release already
        # exists for this tag, the create/publish steps below are skipped so a
        # re-run of a partially-failed release doesn't try to re-publish — and,
        # on immutable-release repos, doesn't error doing so. A leftover draft
        # from a failed run is treated as not-yet-published, so it gets finished.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
               --json isDraft --jq '.isDraft' > /tmp/rel-draft.txt 2>/dev/null \
             && [ "$(cat /tmp/rel-draft.txt)" = "false" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Published release $GITHUB_REF_NAME already exists; skipping GitHub release steps"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft GitHub Release
        if: steps.rel.outputs.exists != 'true'
        # Created as a draft so the jar can be attached: repositories with
        # immutable releases enabled reject asset uploads after publish. The
        # Publish step below flips the draft to published once the jar is on it.
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.meta.outputs.title }}
          tag_name: ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          files: dist/${{ env.MOD_ID }}-*.jar

      - name: Publish release
        if: steps.rel.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false

      - name: Detect publish auth
        id: publish
        # secrets context is not usable in a step `if:`, so map token presence to
        # a step output the platform-publish steps gate on. With neither token
        # both steps are skipped and the GitHub Release above is the only artifact.
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ] || [ -n "$CURSEFORGE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No MODRINTH_TOKEN/CURSEFORGE_TOKEN; skipping mod-platform publish"
          fi

      - name: Checkout concord scripts
        # The publish and changelog-record scripts live in concord, but the job
        # runs in the member checkout — pull them into .concord (same pattern as
        # build-site.yml). Unconditional: the record step below runs even when
        # platform publish is skipped, and it needs the script too.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: rfizzle/concord
          ref: ${{ inputs.concord-ref }}
          path: .concord

      - name: Set up Python
        if: steps.publish.outputs.available == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Publish to Modrinth and CurseForge
        if: steps.publish.outputs.available == 'true'
        # One script owns both platforms: optional dependencies from
        # fabric.mod.json (+ .github/release-slug-overrides.json), CurseForge
        # version-type-aware id resolution, multipart uploads, retries, and
        # idempotency. Modrinth runs first and must succeed before CurseForge,
        # keeping CurseForge the terminal, re-run-safe step.
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_ID: ${{ inputs.modrinth-id || env.MOD_ID }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_ID: ${{ inputs.curseforge-id }}
          VERSION: ${{ steps.meta.outputs.version }}
          TITLE: ${{ steps.meta.outputs.title }}
          PRERELEASE: ${{ steps.meta.outputs.prerelease }}
          GAME_VERSIONS: ${{ inputs.game-versions }}
          LOADERS: ${{ inputs.loaders }}
          ENVIRONMENT: ${{ inputs.environment }}
          CHANGELOG_FILE: /tmp/release-body.md
        run: |
          python3 -m pip install --quiet 'requests>=2.31,<3'
          python3 .concord/scripts/release/publish.py

      - name: Record release notes in changelogs/
        # Terminal and best-effort: mirror the published notes into
        # changelogs/<version>.md on the default branch so the repo keeps a
        # complete Markdown record of every release, not just hand-written ones.
        # This is the committed half of the changelog pipeline — the website
        # changelog derives from changelogs/* plus GitHub Releases, so recording
        # the AI notes here keeps the in-repo history complete.
        #
        # No-op when the version is already recorded (hand-authored file shipped
        # with the tag, or a prior run committed it). master requires a PR
        # (0 approvals, 0 checks), so the script stages the file via the Contents
        # API and merges the PR with the default token — no bypass, no extra
        # secret. continue-on-error keeps a record-keeping hiccup from red-X'ing
        # an already-published release. The script is stdlib-only, so it needs no
        # pip install / setup-python.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.meta.outputs.version }}
          CHANGELOG_FILE: /tmp/release-body.md
        run: python3 .concord/scripts/changelog/record_changelog.py
