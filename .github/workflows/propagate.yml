# Concord — template & file propagation.
#
# Three propagation mechanisms, one workflow:
#
#   1. Site rebuilds — when the shared site template (or the member registry)
#      changes, dispatch a `concord-template-updated` event to every member AND
#      pack repo so all sites pick up the change within minutes. Nothing is
#      committed to those repos; their site workflows rebuild against
#      concord@master.
#
#   2. File sync (PR-based) — concord-owned payloads are proposed to every member
#      via a single `concord-sync` pull request, because member default branches
#      are protected and reject direct commits. Each run stages onto the branch:
#        - everything under propagate/ (e.g. .github/ISSUE_TEMPLATE/*.yml and
#          versions-common.properties, the suite toolchain pins) at the same
#          relative path — only wholly concord-owned files belong here; files
#          repos customize (.gitignore, Makefile) stay copy-paste-by-hand;
#        - AGENTS.md's <!-- concord:NAME:start/end --> regions, rewritten from
#          AGENTS-COMMON.md (repo-owned prose outside the markers is untouched; a
#          member with no markers yet is left alone — seeding is the opt-in);
#        - the vendored .ai/skills/ and .ai/commands/ trees, mirroring `make
#          sync` (rsync -a --delete): concord-dropped files are removed from the
#          member and .ai/skills/.concord-rev records the source concord commit.
#      The branch is reset to the default head each run, so the PR diff is exactly
#      concord's desired changes; with nothing to change, no PR is opened. Logic
#      lives in scripts/open-sync-pr.py.
#
#   3. Issue labels — the shared label taxonomy (labels.json) is reconciled onto
#      every member via the labels API: missing labels created, drifted
#      color/description updated in place, unlisted labels (dependabot's or any
#      repo-local one) left untouched. Nothing is committed and no
#      PR is opened — labels are GitHub-side config, not tracked files. Logic
#      lives in scripts/sync-labels.py.
#
# Requires a repo secret CONCORD_DISPATCH_TOKEN. Without it the workflow fails
# gracefully per-repo.
#
# Use the LEAST-PRIVILEGED credential that works — this token can write to every
# member repo, so its blast radius if leaked is the whole suite:
#   1. Preferred: a GitHub App installed on the member repos, minting a
#      short-lived installation token per run (Contents RW, Pull requests RW,
#      Issues RW, Actions write). Short TTL + per-repo scoping beats a standing
#      secret.
#   2. Otherwise: a FINE-GRAINED PAT scoped to exactly the member repos with
#      Contents RW, Pull requests RW, Issues RW, Actions write, AND an expiry set
#      (rotate on schedule).
# Do NOT use a classic `repo`-scoped PAT: it grants far more than needed across
# every repo the owner can touch and never expires.
name: Propagate template to member sites

on:
  push:
    branches: [master]
    paths:
      - "template/**"
      - "members.json"
      - "propagate/**"
      - "AGENTS-COMMON.md"
      - "gitignore-common"
      - ".ai/skills/**"
      - ".ai/commands/**"
      - "labels.json"
      - "scripts/inject-agents-regions.py"
      - "scripts/open-sync-pr.py"
      - "scripts/sync-labels.py"
  workflow_dispatch:

jobs:
  members:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
      sites: ${{ steps.list.outputs.sites }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: list
        # repos = file-sync targets: members only. A pack is not a Fabric mod, so
        #   the AGENTS.md regions and propagate/ files do not apply to it.
        # sites = site-rebuild targets: members + packs. A pack ships a
        #   template-built site too, so it must rebuild on template/registry
        #   changes even though it takes no file sync.
        run: |
          echo "repos=$(jq -c '[.members[].id]' members.json)" >> "$GITHUB_OUTPUT"
          echo "sites=$(jq -c '[.members[].id] + [.packs[].id]' members.json)" >> "$GITHUB_OUTPUT"

  dispatch:
    needs: members
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.members.outputs.sites) }}
    steps:
      - name: Dispatch rebuild to rfizzle/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: |
          gh api "repos/rfizzle/${{ matrix.repo }}/dispatches" \
            -f event_type=concord-template-updated \
            || echo "::warning::could not dispatch to rfizzle/${{ matrix.repo }} (repo missing site workflow or token lacks access)"

  sync-pr:
    needs: members
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.members.outputs.repos) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Propose concord-owned files to rfizzle/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: python3 scripts/open-sync-pr.py "rfizzle/${{ matrix.repo }}"

  labels:
    needs: members
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.members.outputs.repos) }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Reconcile shared labels on rfizzle/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: python3 scripts/sync-labels.py "rfizzle/${{ matrix.repo }}"
