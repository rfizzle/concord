# Concord — template & file propagation.
#
# Two propagation mechanisms, one workflow:
#
#   1. Site rebuilds — when the shared site template (or the member registry)
#      changes, dispatch a `concord-template-updated` event to every member
#      repo so all sites pick up the change within minutes. Nothing is
#      committed to the member repos; their site workflows rebuild against
#      concord@master.
#
#   2. File sync (PR-based) — concord-owned payloads are proposed to every member
#      via a single `concord-sync` pull request, because member default branches
#      are protected and reject direct commits. Each run stages onto the branch:
#        - everything under propagate/ (e.g. .github/ISSUE_TEMPLATE/*.yml) at the
#          same relative path — only wholly concord-owned files belong here; files
#          repos customize (.gitignore, Makefile) stay copy-paste-by-hand;
#        - AGENTS.md's <!-- concord:NAME:start/end --> regions, rewritten from
#          AGENTS-COMMON.md (repo-owned prose outside the markers is untouched; a
#          member with no markers yet is left alone — seeding is the opt-in).
#      The branch is reset to the default head each run, so the PR diff is exactly
#      concord's desired changes; with nothing to change, no PR is opened. Logic
#      lives in scripts/open-sync-pr.sh.
#
# Requires a repo secret CONCORD_DISPATCH_TOKEN: a fine-grained PAT scoped to all
# member repos with "Contents: read & write", "Pull requests: read & write", and
# "Actions: write" (or classic `repo` scope). Without it the workflow fails
# gracefully per-repo.
name: Propagate template to member sites

on:
  push:
    branches: [master]
    paths:
      - "template/**"
      - "members.json"
      - "propagate/**"
      - "AGENTS-COMMON.md"
      - "scripts/inject-agents-regions.py"
      - "scripts/open-sync-pr.sh"
  workflow_dispatch:

jobs:
  members:
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.list.outputs.repos }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: echo "repos=$(jq -c '[.members[].id]' members.json)" >> "$GITHUB_OUTPUT"

  dispatch:
    needs: members
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.members.outputs.repos) }}
    steps:
      - name: Dispatch rebuild to rfizzle/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: |
          gh api "repos/rfizzle/${{ matrix.repo }}/dispatches" \
            -f event_type=concord-template-updated \
            || echo "::warning::could not dispatch to rfizzle/${{ matrix.repo }} (repo missing site workflow or token lacks access)"

  sync-pr:
    needs: members
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.members.outputs.repos) }}
    steps:
      - uses: actions/checkout@v4
      - name: Propose concord-owned files to rfizzle/${{ matrix.repo }}
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: bash scripts/open-sync-pr.sh "rfizzle/${{ matrix.repo }}"
