# Concord — reusable CI for member mods.
#
# Replaces the per-repo ci.yml + test.yml pair: one gradle build (which
# compiles, runs unit tests, and jars) with JaCoCo coverage, plus a
# gametest job. Caller stub:
#
#   name: CI
#   on:
#     push: { branches: [master] }
#     pull_request: { branches: [master] }
#   permissions:
#     contents: read
#     checks: write
#     pull-requests: write
#   jobs:
#     ci:
#       uses: rfizzle/concord/.github/workflows/mod-ci.yml@master
#       secrets: inherit
#
# CI contract (every member repo's gradle must provide):
#   ./gradlew build jacocoTestReport runGametest
#   coverage xml at build/reports/jacoco/test/jacocoTestReport.xml
#   junit xml at build/test-results/test/ and build/junit-gametest.xml
name: Mod CI

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (compile + unit tests + jar) with coverage
        run: ./gradlew build jacocoTestReport --no-daemon --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-report
          path: build/reports/tests/test/
          retention-days: 7
          if-no-files-found: ignore

  gametest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run gametests
        run: ./gradlew runGametest --no-daemon --stacktrace

      - name: Upload gametest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gametest-report
          path: |
            build/gametest/
            build/junit-gametest.xml
          retention-days: 7
          if-no-files-found: ignore
