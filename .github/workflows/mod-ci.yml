# Concord — reusable CI for member mods.
#
# One job, because coverage is measured across both sweeps: the unit tests and
# the gametests each drop a JaCoCo exec file, and `jacocoMergedReport` merges
# them into the mod's real coverage number. Split across two runners the exec
# files never coexist, so the sweeps share a job. Caller stub:
#
#   name: CI
#   on:
#     push: { branches: [master] }
#     pull_request: { branches: [master] }
#   permissions:
#     contents: read
#     checks: write
#     pull-requests: write
#   jobs:
#     ci:
#       uses: rfizzle/concord/.github/workflows/mod-ci.yml@master
#       secrets: inherit
#
# CI contract (every member repo's gradle must provide):
#   ./gradlew build runGametest jacocoMergedReport
#   merged coverage xml at
#     build/reports/jacoco/jacocoMergedReport/jacocoMergedReport.xml
#   junit xml at build/test-results/test/ and build/junit-gametest.xml
#
# Optional, run when the member defines it:
#   ./gradlew verifyDatagenIdempotent
name: Mod CI

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    # Only reads the repo and uploads artifacts. The caller stub grants
    # checks/pull-requests write, which this job never uses — cap it here so
    # an over-broad stub can't widen this reusable workflow's token.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (compile + unit tests + jar)
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run gametests
        run: ./gradlew runGametest --no-daemon --stacktrace

      # dependsOn runDatagen, which forks a Minecraft server — so this only
      # runs for members that define the task. `help --task` exits non-zero
      # when the task is absent, which is the gate.
      - name: Verify datagen is idempotent
        run: |
          if ./gradlew --no-daemon -q help --task verifyDatagenIdempotent >/dev/null 2>&1; then
            ./gradlew verifyDatagenIdempotent --no-daemon --stacktrace
          else
            echo "verifyDatagenIdempotent is not defined in this repo — skipping."
          fi

      # always(), so a failed sweep still publishes what coverage it has. The
      # task itself warns when an exec file is missing or empty, so a partial
      # number can't pass itself off as merged.
      - name: Merged coverage report (unit + gametest)
        if: always()
        run: ./gradlew jacocoMergedReport --no-daemon --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-report
          path: build/reports/tests/test/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload gametest report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gametest-report
          path: |
            build/gametest/
            build/junit-gametest.xml
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload merged coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: build/reports/jacoco/jacocoMergedReport/
          retention-days: 7
          if-no-files-found: ignore
