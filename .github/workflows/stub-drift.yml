# Detects drift between the member repos' .github/workflows/*.yml caller stubs
# and the canonical contract in workflow-stubs.json. Fetches each member stub
# fresh via the GitHub API (the members aren't checked out in CI) into a temp
# mirror, then runs the same checker as `make stubs-check`. Fails the run on any
# permissions- or uses-ref drift, so a widened member token surfaces here.
#
# Reuses CONCORD_DISPATCH_TOKEN (the propagate credential) for read access to
# member repos. Runs weekly and on demand — not on push/PR — so a real,
# currently-known drift doesn't block unrelated pull requests.
name: Member workflow stub drift

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays, 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ensure PyYAML
        run: python3 -c "import yaml" 2>/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq python3-yaml; }
      - name: Fetch member stubs
        env:
          GH_TOKEN: ${{ secrets.CONCORD_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/members"
          for id in $(jq -r '.members[].id' members.json); do
            for stub in $(jq -r '.stubs[].member' workflow-stubs.json); do
              dest="$root/$id/.github/workflows/$stub"
              mkdir -p "$(dirname "$dest")"
              if content=$(gh api "repos/rfizzle/$id/contents/.github/workflows/$stub" --jq '.content' 2>/dev/null); then
                printf '%s' "$content" | base64 -d > "$dest"
              else
                echo "::warning::could not fetch $id/.github/workflows/$stub (missing stub or no access)"
              fi
            done
          done
      - name: Check for drift
        run: python3 scripts/check-workflow-stubs.py --root "$RUNNER_TEMP/members"
