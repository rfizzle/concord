# Concord — reusable Claude spec writer for member mods.
#
# When an issue gets the `needs-spec` label, normalizes the issue title to a
# conventional-commit form and writes a plain-language summary plus a
# structured implementation spec into the issue body, preserving the
# reporter's original text in between (Jules reads the body, not comments).
#
# Once the spec lands the `needs-spec` label is removed and a status label is
# added: `ready` when the spec has no open questions, `open-questions` when it
# does. Both lead to a human applying `jules`; the open-questions path is just
# answered inline first.
#
# Prompt resolution order (first match wins):
#   1. explicit `prompt-file` workflow input (path in the calling repo)
#   2. the calling repo's .ai/prompts/spec-writer.md (whole-file override)
#   3. the suite default in this repo's .ai/
# Caller stub:
#
#   name: Claude Spec Writer
#   on:
#     issues: { types: [labeled] }
#   concurrency:
#     group: claude-spec-${{ github.event.issue.number }}
#     cancel-in-progress: false
#   permissions:
#     contents: read
#     issues: write
#   jobs:
#     spec:
#       uses: rfizzle/concord/.github/workflows/claude-spec.yml@master
#       secrets: inherit
name: Claude Spec Writer

on:
  workflow_call:
    inputs:
      prompt-file:
        description: "path (in the calling repo) to a custom spec-writer prompt; empty = auto-resolve"
        type: string
        default: ""
      label:
        type: string
        default: needs-spec
      ready-label:
        # Added when the spec lands with no open questions: apply `jules`.
        type: string
        default: ready
      open-questions-label:
        # Added when the spec raises open questions: answer them inline, then
        # apply `jules` directly. No spec re-run is required.
        type: string
        default: open-questions
      model:
        type: string
        default: claude-sonnet-4-6
      max-budget-usd:
        type: string
        default: "5.00"
      max-turns:
        type: string
        # Headroom for the alignment step: list .ai/skills/, read the triggered
        # SKILL.md files, then write the spec.
        default: "40"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  spec:
    if: github.event.label.name == inputs.label
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Checkout concord (prompt defaults)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: rfizzle/concord
          ref: master
          path: .concord

      - name: Install Claude Code
        run: |
          # Fetch the installer to disk rather than piping the network stream
          # straight into bash: this captures the exact bytes (a truncated/MITM'd
          # response can't partially execute) and logs their digest for audit.
          curl -fsSL https://claude.ai/install.sh -o /tmp/claude-install.sh
          echo "claude install.sh sha256: $(sha256sum /tmp/claude-install.sh | cut -d' ' -f1)"
          # To pin against supply-chain tampering, set EXPECTED_SHA256 to the
          # logged digest once reviewed — install then fails closed on any change.
          EXPECTED_SHA256=""
          if [ -n "$EXPECTED_SHA256" ]; then
            echo "${EXPECTED_SHA256}  /tmp/claude-install.sh" | sha256sum -c - \
              || { echo "::error::claude install.sh checksum mismatch"; exit 1; }
          fi
          bash /tmp/claude-install.sh

      - name: Build spec prompt
        run: |
          # Resolution: explicit input > repo-local .ai/ file > concord default.
          # An explicit input that points at a missing file is a config error.
          if [ -n "${{ inputs.prompt-file }}" ]; then
            PROMPT_FILE="${{ inputs.prompt-file }}"
            [ -f "$PROMPT_FILE" ] || { echo "::error::prompt-file '$PROMPT_FILE' not found"; exit 1; }
          else
            PROMPT_FILE=.ai/prompts/spec-writer.md
            [ -f "$PROMPT_FILE" ] || PROMPT_FILE=.concord/.ai/prompts/spec-writer.md
          fi
          echo "Using prompt: $PROMPT_FILE"

          ISSUE_TITLE="$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json title --jq .title)"
          ISSUE_BODY="$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq .body)"

          PROMPT="$(cat "$PROMPT_FILE")

          ---
          Project conventions (from AGENTS.md):
          $(cat AGENTS.md 2>/dev/null || echo '(no AGENTS.md in this repository)')

          ---
          Issue #${{ github.event.issue.number }}: ${ISSUE_TITLE}

          ${ISSUE_BODY}"

          echo "$PROMPT" > /tmp/spec-prompt.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Surface the exact prompt sent to the model — download from the run's
      # Artifacts to confirm the issue body and AGENTS.md are present. The
      # prompt holds no secrets (the token is passed via env).
      - name: Upload spec prompt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spec-prompt
          path: /tmp/spec-prompt.txt
          if-no-files-found: warn

      - name: Run spec writer
        run: |
          ATTEMPT=0
          MAX_ATTEMPTS=3
          # Accumulated across attempts so the reported figure is the whole
          # job's spend, not just the winning attempt.
          TOTAL_COST=0
          TOTAL_TURNS=0

          # Report dollar spend to the Actions run summary (and the log).
          report_cost() {
            echo "💲 Spec writer: \$${TOTAL_COST} over ${TOTAL_TURNS} turn(s) in ${ATTEMPT} attempt(s) on ${{ inputs.model }}"
            if [ -n "$GITHUB_STEP_SUMMARY" ]; then
              {
                echo "### 💲 Spec writer cost"
                echo ""
                echo "| Model | Cost (USD) | Turns | Attempts |"
                echo "|---|---|---|---|"
                echo "| ${{ inputs.model }} | \$${TOTAL_COST} | ${TOTAL_TURNS} | ${ATTEMPT} |"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          }

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Spec attempt ${ATTEMPT}/${MAX_ATTEMPTS}"

            RESULT="$(~/.local/bin/claude -p \
              --output-format json \
              --model ${{ inputs.model }} \
              --max-turns ${{ inputs.max-turns }} \
              --max-budget-usd ${{ inputs.max-budget-usd }} \
              < /tmp/spec-prompt.txt 2>/tmp/spec-stderr.txt)" || true

            COST="$(echo "$RESULT" | jq -r '.total_cost_usd // 0' 2>/dev/null)" || COST=0
            TURNS="$(echo "$RESULT" | jq -r '.num_turns // 0' 2>/dev/null)" || TURNS=0
            TOTAL_COST="$(awk "BEGIN{printf \"%.4f\", ${TOTAL_COST:-0} + ${COST:-0}}")"
            TOTAL_TURNS=$((TOTAL_TURNS + ${TURNS:-0}))

            COMMENT="$(echo "$RESULT" | jq -r '.result // empty' 2>/dev/null)" || true

            if [ -n "$COMMENT" ] && echo "$COMMENT" | grep -q "## Implementation Spec"; then
              echo "Spec produced successfully on attempt ${ATTEMPT}"
              echo "$COMMENT" > /tmp/spec-comment.md
              report_cost
              break
            fi

            echo "Attempt ${ATTEMPT} did not produce valid output"
            echo "--- claude stderr (tail) ---"
            tail -c 2000 /tmp/spec-stderr.txt || true
            echo "--- raw result (head) ---"
            echo "$RESULT" | head -c 2000
            echo "---"
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              report_cost
              echo "::error::All ${MAX_ATTEMPTS} spec attempts failed to produce valid output"
              exit 1
            fi
          done
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Apply title, summary, and spec to issue
        run: |
          if [ ! -s /tmp/spec-comment.md ]; then
            echo "No spec to apply"
            exit 0
          fi

          # The model emits, before the spec, a conventional-commit title and a
          # plain-language summary in HTML-comment markers (which don't render):
          #   <!-- spec:title: feat(scope): … -->
          #   <!-- spec:summary --> … <!-- /spec:summary -->
          # `|| true`: grep exits non-zero when no title marker is present, and
          # the step runs under `set -eo pipefail` — degrade to no retitle.
          NEW_TITLE="$(grep -m1 '<!-- spec:title:' /tmp/spec-comment.md \
            | sed -E 's/.*<!-- spec:title:[[:space:]]*//; s/[[:space:]]*-->.*//')" || true
          SUMMARY="$(sed -n '/<!-- spec:summary -->/,/<!-- \/spec:summary -->/p' /tmp/spec-comment.md \
            | sed '1d;$d')"

          # Trim any model preamble (the markers above) before the spec header.
          sed -n '/^## Implementation Spec/,$p' /tmp/spec-comment.md > /tmp/spec-trimmed.md
          [ -s /tmp/spec-trimmed.md ] || cp /tmp/spec-comment.md /tmp/spec-trimmed.md

          # Two fenced regions keep the body idempotent across re-runs: the
          # generated summary sits above the reporter's original text, the spec
          # below it. Re-running strips both fences before regenerating, so the
          # human-authored middle is preserved and nothing stacks. Jules reads
          # the body, not comments.
          SUM_BEGIN='<!-- claude-summary:begin -->'
          SUM_END='<!-- claude-summary:end -->'
          SPEC_BEGIN='<!-- claude-spec:begin -->'
          SPEC_END='<!-- claude-spec:end -->'
          ISSUE_BODY="$(gh issue view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json body --jq .body)"
          # Strip both prior fences, then drop leading blank lines so a blank
          # leaked just below a removed fence doesn't accrete on each re-run.
          # ($() already trims trailing newlines, so the tail stays stable.)
          ORIGINAL="$(printf '%s' "$ISSUE_BODY" \
            | sed "/$SUM_BEGIN/,/$SUM_END/d; /$SPEC_BEGIN/,/$SPEC_END/d" \
            | sed '/./,$!d')"

          {
            if [ -n "$SUMMARY" ]; then
              printf '%s\n' "$SUM_BEGIN"
              printf '%s\n\n---\n' "$SUMMARY"
              printf '%s\n\n' "$SUM_END"
            fi
            printf '%s\n' "$ORIGINAL"
            printf '\n%s\n' "$SPEC_BEGIN"
            printf '\n---\n\n'
            cat /tmp/spec-trimmed.md
            printf '\n%s\n' "$SPEC_END"
          } > /tmp/issue-body.md

          # Always normalize the title to a conventional-commit form; skip only
          # if the model failed to produce one.
          TITLE_ARGS=()
          if [ -n "$NEW_TITLE" ]; then
            echo "Normalizing title to: $NEW_TITLE"
            TITLE_ARGS=(--title "$NEW_TITLE")
          else
            echo "::warning::No title marker found; leaving the issue title unchanged"
          fi

          # GitHub's API occasionally returns transient 401s — retry with backoff.
          for i in 1 2 3; do
            if gh issue edit ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              "${TITLE_ARGS[@]}" \
              --body-file /tmp/issue-body.md; then
              exit 0
            fi
            echo "Edit attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::Failed to apply spec to issue after 3 attempts"
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove trigger label
        # Only when the spec landed: the label is the work queue, so dropping it
        # on failure would silently lose the issue.
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --remove-label "${{ inputs.label }}" || \
            echo "::warning::Could not remove '${{ inputs.label }}' label"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add status label
        # Route the issue to its follow-up state. A clean spec gets `ready`
        # (apply `jules`). A spec that raised open questions gets
        # `open-questions` — answer them inline, then apply `jules` directly;
        # the spec is not re-run for that.
        run: |
          if [ ! -s /tmp/spec-trimmed.md ]; then
            echo "No spec produced; leaving status labels unchanged"
            exit 0
          fi

          # The spec template makes "### Open questions" the final section and
          # omits it entirely when there are none. Treat the spec as having
          # open questions only if that section exists with a real bullet.
          OPEN_Q="$(sed -n '/^### Open questions/,$p' /tmp/spec-trimmed.md \
            | sed '1d' \
            | grep -cE '^[[:space:]]*[-*][[:space:]]+[^[:space:]]')" || OPEN_Q=0

          if [ "${OPEN_Q:-0}" -gt 0 ]; then
            STATUS_LABEL="${{ inputs.open-questions-label }}"
            echo "Spec raised ${OPEN_Q} open question(s); labeling '${STATUS_LABEL}'"
          else
            STATUS_LABEL="${{ inputs.ready-label }}"
            echo "Spec has no open questions; labeling '${STATUS_LABEL}'"
          fi

          # The label must exist in the repo for --add-label to succeed; warn
          # rather than fail so a missing label never loses the landed spec.
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "$STATUS_LABEL" || \
            echo "::warning::Could not add '${STATUS_LABEL}' label (does it exist in the repo?)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
